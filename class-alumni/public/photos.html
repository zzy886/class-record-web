<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相册 · 班级同学录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md py-4 px-6 flex flex-wrap justify-between items-center">
        <a href="/" class="text-2xl font-bold text-indigo-600"><i class="fas fa-graduation-cap mr-2"></i>青春纪念册</a>
        <div class="space-x-4 md:space-x-6 text-gray-700">
            <a href="/" class="hover:text-indigo-600">首页</a>
            <a href="/students.html" class="hover:text-indigo-600">同学录</a>
            <a href="/messages.html" class="hover:text-indigo-600">留言板</a>
            <a href="/photos.html" class="hover:text-indigo-600 font-medium">相册</a>
            <a href="/blessings.html" class="hover:text-indigo-600">毕业寄语</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800"><i class="fas fa-images text-indigo-500 mr-3"></i>班级相册</h1>
            <button id="showUploadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg">
                <i class="fas fa-cloud-upload-alt mr-2"></i>上传照片
            </button>
        </div>

        <!-- 上传表单 (默认隐藏) -->
        <div id="uploadPanel" class="bg-white rounded-xl shadow p-6 mb-8 hidden">
            <h2 class="text-xl font-semibold mb-4">上传新照片</h2>
            <form id="photoForm">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">照片标题</label>
                    <input type="text" id="photoTitle" required class="w-full border border-gray-300 rounded-lg px-4 py-2">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">描述 (可选)</label>
                    <input type="text" id="photoDesc" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">选择图片</label>
                    <input type="file" id="photoFile" accept="image/*" required class="w-full">
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg">上传</button>
                    <button type="button" id="cancelUploadBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-2 rounded-lg">取消</button>
                </div>
            </form>
        </div>

        <!-- 照片网格 -->
        <div id="photosGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <p class="text-gray-500 col-span-full text-center py-8">加载中...</p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/photos.js"></script>
</body>
</html>
