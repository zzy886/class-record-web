<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 · 班级同学录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md py-4 px-6 flex flex-wrap justify-between items-center">
        <a href="/" class="text-2xl font-bold text-indigo-600"><i class="fas fa-graduation-cap mr-2"></i>青春纪念册</a>
        <div class="space-x-4 md:space-x-6 text-gray-700">
            <a href="/" class="hover:text-indigo-600">首页</a>
            <a href="/students.html" class="hover:text-indigo-600">同学录</a>
            <a href="/messages.html" class="hover:text-indigo-600 font-medium">留言板</a>
            <a href="/photos.html" class="hover:text-indigo-600">相册</a>
            <a href="/blessings.html" class="hover:text-indigo-600">毕业寄语</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-3xl">
        <h1 class="text-3xl font-bold mb-6 text-gray-800"><i class="fas fa-comment-dots text-indigo-500 mr-3"></i>留言板</h1>
        
        <!-- 留言表单 -->
        <div class="bg-white rounded-xl shadow p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">写下你的祝福或回忆</h2>
            <form id="messageForm">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">昵称</label>
                    <input type="text" id="nickname" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">留言内容</label>
                    <textarea id="content" rows="3" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
                </div>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded-lg transition">
                    <i class="fas fa-paper-plane mr-2"></i>发布留言
                </button>
            </form>
        </div>

        <!-- 留言列表 -->
        <div id="messagesList" class="space-y-4">
            <p class="text-gray-500">加载中...</p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/messages.js"></script>
</body>
</html>
